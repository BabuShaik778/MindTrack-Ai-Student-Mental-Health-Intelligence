<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Background with animated gradient */
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b, #3b82f6, #9333ea);
      background-size: 400% 400%;
      animation: bgShift 15s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Card - Glassmorphism */
    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(25px) saturate(180%);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      width: 380px;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 35px 80px rgba(0,0,0,0.35);
    }

    .card h3 {
      font-weight: 900;
      background: linear-gradient(90deg, #3b82f6, #9333ea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Floating labels */
    .form-floating {
      position: relative;
    }

    .form-floating label {
      position: absolute;
      top: 12px;
      left: 14px;
      color: #64748b;
      transition: 0.3s ease;
      pointer-events: none;
    }

    .form-control:focus + label,
    .form-control:not(:placeholder-shown) + label {
      top: -8px;
      left: 12px;
      font-size: 12px;
      color: #9333ea;
      background: rgba(255,255,255,0.85);
      padding: 0 4px;
      border-radius: 4px;
    }

    /* Inputs */
    .form-control {
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: rgba(255,255,255,0.85);
      padding: 14px;
      transition: all 0.25s ease;
    }

    .form-control:focus {
      border-color: #9333ea;
      box-shadow: 0 0 12px rgba(147,51,234,0.6);
    }

    /* Button - Animated Gradient */
    .btn-primary {
      background: linear-gradient(135deg, #ff4500, #ff7f50, #ffb347, #facc15);
      background-size: 300% 300%;
      animation: gradientShift 6s ease infinite;
      border: none;
      font-weight: 700;
      border-radius: 12px;
      color: white;
      box-shadow: 0 10px 25px rgba(255,69,0,0.4);
      transition: transform 0.25s ease;
      padding: 12px;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.03);
      opacity: 0.95;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .alert {
      border-radius: 10px;
      font-size: 14px;
    }

    a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="card p-4">
  <h3 class="text-center mb-4">Login</h3>

  <!-- Flash Messages -->
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- Login Form -->
  <form method="POST">
    <div class="form-floating mb-3">
      <input type="email" name="email" class="form-control" placeholder=" " required>
      <label>Email</label>
    </div>

    <div class="form-floating mb-3">
      <input type="password" name="password" class="form-control" placeholder=" " required>
      <label>Password</label>
    </div>

    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>

  <p class="text-center mt-3 text-white-50">
    Don't have an account? <a href="/signup">Signup</a>
  </p>
</div>

</body>
</html>
